<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="{{ url_for('static', filename='favicon.svg') }}" type="image/svg+xml">
  <title>로그인 — NYJ Workforce Management</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: 'Malgun Gothic', sans-serif; max-width: 420px; margin: 64px auto; padding: 0 16px; }
    h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .sub { color: #666; margin-bottom: 32px; line-height: 1.5; }
    .btn-google {
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      width: 100%; padding: 14px 20px; border: 1px solid #dadce0; border-radius: 8px;
      background: #fff; color: #3c4043; font-size: 1rem; font-weight: 500;
      text-decoration: none; cursor: pointer; box-shadow: 0 1px 2px rgba(0,0,0,.06);
      transition: box-shadow .2s, background .2s;
    }
    .btn-google:hover { background: #f8f9fa; box-shadow: 0 2px 6px rgba(0,0,0,.1); }
    .btn-google svg { width: 20px; height: 20px; }
  </style>
</head>
<body>
  <p style="text-align:right; margin:0 0 12px; font-size:0.72rem; color:#94a3b8; font-weight:600; letter-spacing:0.03em;">{{ app_version }}</p>
  <h1>NYJ Workforce Management</h1>
  <p class="sub">사내 Google 계정으로 로그인한 뒤 엑셀 업로드와 결과를 이용할 수 있습니다.</p>
  <a class="btn-google" href="{{ url_for('google.login') }}">
    <svg viewBox="0 0 24 24" aria-hidden="true"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
    Google로 계속하기
  </a>
</body>
</html>
