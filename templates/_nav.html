<header style="display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:12px; margin-bottom:20px; padding-bottom:12px; border-bottom:1px solid #eee;">
  <a href="{{ url_for('index') }}" style="text-decoration:none;color:#222;font-weight:600;font-size:1rem;">HR 급여 검증</a>
  {% if auth_enabled %}
  <nav style="display:flex; flex-wrap:wrap; gap:12px 16px; align-items:center; font-size:0.9rem;">
    <span style="color:#555;">{{ current_user_email }}</span>
    <a href="{{ url_for('dashboard') }}" style="color:#06c;text-decoration:none;">인건비 대시보드</a>
    <a href="{{ url_for('logout') }}" style="color:#666;text-decoration:none;">로그아웃</a>
  </nav>
  {% endif %}
</header>
