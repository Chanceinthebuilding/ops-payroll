<header style="display:flex; flex-wrap:wrap; justify-content:space-between; align-items:center; gap:12px; margin-bottom:18px; padding:10px 14px; border:1px solid rgba(255,255,255,0.72); border-radius:16px; background:rgba(255,255,255,0.62); backdrop-filter: blur(12px); box-shadow:0 6px 18px rgba(15,23,42,0.06);">
  <a href="{{ url_for('index') }}" style="text-decoration:none;color:#111827;font-weight:700;font-size:0.95rem; letter-spacing:-0.01em;">HR 급여 검증</a>
  <div style="display:flex; flex-wrap:wrap; align-items:center; gap:10px 14px; margin-left:auto;">
    <span title="배포 버전" style="font-size:0.72rem; color:#94a3b8; font-weight:600; letter-spacing:0.03em; white-space:nowrap;">{{ app_version }}</span>
    {% if auth_enabled %}
    <nav style="display:flex; flex-wrap:wrap; gap:8px 10px; align-items:center; font-size:0.82rem;">
      <span style="color:#64748b; font-weight:500;">{{ current_user_email }}</span>
      {% if is_admin_user %}
      <a href="{{ url_for('admin') }}" style="color:#1d4ed8;text-decoration:none; padding:6px 10px; border-radius:999px; background:#eff6ff; border:1px solid #dbeafe; font-weight:700;">급여 데이터 관리</a>
      {% endif %}
      <a href="{{ url_for('dashboard') }}" style="color:#0f172a;text-decoration:none; padding:6px 10px; border-radius:999px; background:#f8fafc; border:1px solid #e2e8f0; font-weight:600;">인건비 대시보드</a>
      <a href="{{ url_for('logout') }}" style="color:#475569;text-decoration:none; padding:6px 10px; border-radius:999px; background:#f8fafc; border:1px solid #e2e8f0; font-weight:600;">로그아웃</a>
    </nav>
    {% endif %}
  </div>
</header>
